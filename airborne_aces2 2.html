<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="format-detection" content="telephone=no" />
<title>Airborne Aces</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: 'Rockwell', 'Rockwell Nova', 'Roboto Slab', Georgia, serif;
  background: #2a1f14;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

#menuScreen {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

.stage {
  position: relative;
  width: 100%;
  max-width: 480px;
  aspect-ratio: 780 / 1398;
  margin: 0 auto;
}

.stageBg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: 0;
}

/* BACKGROUND CLOUDS — sit behind the blimp, subtle drift, fixed 50% opacity */
.cloudLayer {
  position: absolute;
  z-index: 1;
  opacity: 0.5;
  pointer-events: none;
}

.cloudLayer.cA {
  top: 4%;
  left: 6%;
  width: 46%;
  animation: driftCloudA 9s ease-in-out infinite;
}

.cloudLayer.cB {
  top: 14%;
  right: 4%;
  width: 40%;
  animation: driftCloudB 11s ease-in-out infinite;
}

@keyframes driftCloudA {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(4%, -2%); }
}

@keyframes driftCloudB {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-5%, 2%); }
}

/* HERO BLIMP — floats alone in the open sky area, no frame/scenery/vignette.
   Two stacked image layers crossfade between animation frames for a smooth,
   motion-blurred spin rather than a hard frame-to-frame pop. */
.heroBlimpWrap {
  position: absolute;
  top: 6%;
  left: 50%;
  width: 54%;
  transform: translateX(-50%);
  z-index: 2;
  animation: floatHero 3s ease-in-out infinite;
  filter: drop-shadow(0 5px 6px rgba(0,0,0,0.3));
}

.heroBlimpWrap img {
  display: block;
  width: 100%;
}

/* PROPELLER SPIN BLUR — a soft rotating fan-blur disc over the propeller hub */
.propBlur {
  position: absolute;
  left: 18%;
  top: 41.5%;
  width: 15%;
  aspect-ratio: 1 / 1;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: repeating-conic-gradient(
    rgba(35, 26, 18, 0.42) 0deg 7deg,
    rgba(35, 26, 18, 0.06) 7deg 24deg,
    transparent 24deg 45deg
  );
  opacity: 0.75;
  animation: spinProp 0.32s linear infinite;
  pointer-events: none;
}

@keyframes spinProp {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* SMOKE PUFFS — soft rising/fading circles staggered from the exhaust tip */
.smokeParticles {
  position: absolute;
  left: 18%;
  top: 50%;
  width: 1px;
  height: 1px;
  pointer-events: none;
}

.smokeParticles .puff {
  position: absolute;
  left: 0;
  top: 0;
  width: 34px;
  height: 34px;
  margin-left: -17px;
  margin-top: -17px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(225,220,210,0.65) 0%, rgba(225,220,210,0.25) 55%, rgba(225,220,210,0) 75%);
  filter: blur(1.5px);
  opacity: 0;
  animation: puffRise 3.2s ease-out infinite;
}

.smokeParticles .p1 { animation-delay: 0s; }
.smokeParticles .p2 { animation-delay: 0.65s; }
.smokeParticles .p3 { animation-delay: 1.3s; }
.smokeParticles .p4 { animation-delay: 1.95s; }
.smokeParticles .p5 { animation-delay: 2.6s; }

@keyframes puffRise {
  0% { transform: translate(0, 0) scale(0.35); opacity: 0; }
  12% { opacity: 0.7; }
  100% { transform: translate(-75%, -95%) scale(1.9); opacity: 0; }
}

@keyframes floatHero {
  0%,100% { transform: translate(-50%, 0px); }
  50% { transform: translate(-50%, -8px); }
}

/* TAKE FLIGHT HOTSPOT — invisible button over the baked-in circle */
.flyBtn {
  position: absolute;
  top: 52.7%;
  left: 49.9%;
  width: 24.9%;
  height: 13.9%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s ease-out;
  z-index: 3;
}

.flyBtn::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,214,120,0.55) 0%, rgba(255,214,120,0) 70%);
  opacity: 0;
  transition: opacity 0.15s ease-out;
  pointer-events: none;
}

.flyBtn.pressed {
  transform: translate(-50%, -50%) scale(0.94);
}

.flyBtn.pressed::after {
  opacity: 1;
}

/* BLIMP-SELECT NUMBER BUTTONS — hotspots over the "1 2 3 4" dial buttons,
   each reveals its own glowing-number art when active */
.numBtn {
  position: absolute;
  top: 75.1%;
  width: 9%;
  height: 5.02%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  z-index: 3;
}
.numBtn.n1 { left: 30.9%; }
.numBtn.n2 { left: 43.7%; }
.numBtn.n3 { left: 56.2%; }
.numBtn.n4 { left: 69.0%; }

.numBtn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  opacity: 0;
  transition: opacity 0.15s ease-out;
  pointer-events: none;
}

.numBtn.active img {
  opacity: 1;
}

/* TAP STRENGTH SLIDER */
.sliderArea {
  position: absolute;
  top: 87%;
  left: 50%;
  transform: translateX(-50%);
  width: 46%;
  z-index: 1;
  text-align: center;
}

.sliderLabel {
  display: block;
  color: #3a2a18;
  font-size: 3.2vw;
  font-weight: bold;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 2%;
  text-shadow: 0 1px 0 rgba(255,255,255,0.35);
}

input[type=range].tapSlider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 9vw;
  max-height: 36px;
  background: transparent;
  margin: 0;
  cursor: pointer;
  display: block;
}

input[type=range].tapSlider:focus {
  outline: none;
}

input[type=range].tapSlider::-webkit-slider-runnable-track {
  width: 100%;
  height: 9vw;
  max-height: 36px;
  background: url("https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_01.webp?cb=2") no-repeat center / 100% 100%;
}

input[type=range].tapSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 5.5vw;
  height: 5.5vw;
  max-width: 22px;
  max-height: 22px;
  border-radius: 50%;
  background: url("https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_02.webp?cb=2") no-repeat center / contain;
  margin-top: calc((9vw - 5.5vw) / 2);
  box-shadow: 0 2px 3px rgba(0,0,0,0.55);
}

input[type=range].tapSlider::-moz-range-track {
  width: 100%;
  height: 9vw;
  max-height: 36px;
  background: url("https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_01.webp?cb=2") no-repeat center / 100% 100%;
  border: none;
}

input[type=range].tapSlider::-moz-range-thumb {
  width: 5.5vw;
  height: 5.5vw;
  max-width: 22px;
  max-height: 22px;
  border: none;
  border-radius: 50%;
  background: url("https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_02.webp?cb=2") no-repeat center / contain;
  box-shadow: 0 2px 3px rgba(0,0,0,0.55);
}


/* ===== Game screen styles ===== */
#gameScreen {
    background: #3b2a1a;
  }

  
  #gameCanvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  /* HUD */
  /* HUD FRAME — the steampunk leather/brass header art sits at the very top;
     score, timer, and health meter are positioned as percentages of this
     frame's own box, so they scale and stay aligned together at any width */
  #hudFrame {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    aspect-ratio: 2487 / 507; /* widened ratio keeps the same on-screen height as before while stretching to full width */
    z-index: 15;
    pointer-events: none;
  }

  #hudFrameImg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .scoreFrame {
    position: absolute;
    left: 24.5%;
    top: 8%;
    width: 52.3%;
    height: 37%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3a2410;
    font-weight: bold;
    font-size: clamp(15px, 5vw, 30px);
    letter-spacing: 0.5px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    line-height: 1;
    text-align: center;
  }

  /* HEALTH METER — sits inside the frame's heart badge, upper-left */
  #healthMeter {
    position: absolute;
    left: 1%;
    top: 8%;
    width: 16.5%;
    z-index: 2;
    pointer-events: none;
    transition: transform 0.1s ease-out;
  }

  #healthMeter img {
    display: block;
    width: 100%;
  }

  #healthMeter.hit {
    animation: healthHitPulse 0.35s ease-out;
  }

  @keyframes healthHitPulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  /* BONUS HEARTS — small row tucked below the health badge, still inside the frame */
  #bonusHearts {
    position: absolute;
    left: 2%;
    top: 66%;
    display: flex;
    gap: 3px;
    z-index: 2;
    pointer-events: none;
  }

  #bonusHearts img {
    width: 14px;
    display: block;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    animation: bonusHeartPop 0.3s ease-out;
  }

  @keyframes bonusHeartPop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.25); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* STORM POWER-UP METER — bottom-right corner */
  #stormMeter {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    right: 14px;
    width: 46px;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  #stormTank {
    position: relative;
    width: 42px;
    height: 54px;
    border-radius: 9px 9px 5px 5px;
    background: linear-gradient(#2a1c10, #1a1008);
    border: 3px solid #c9a66b;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  #stormTank::before {
    content: "";
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 9px;
    background: #8b6b3d;
    border: 2px solid #c9a66b;
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }

  #stormFill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0%;
    background: linear-gradient(#e0c264, #a8842f 55%, #5e1212);
    transition: height 0.35s ease-out;
  }

  #stormIcon {
    position: absolute;
    top: 50%; left: 50%;
    width: 22px;
    transform: translate(-50%, -50%);
    opacity: 0.9;
  }

  #stormLabel {
    margin-top: 3px;
    font-family: 'Georgia', serif;
    font-weight: bold;
    font-size: 8px;
    letter-spacing: 0.5px;
    color: #f5e6c8;
    text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  }

  #stormMeter.ready #stormTank {
    animation: stormReadyPulse 0.9s ease-in-out infinite;
    pointer-events: auto;
    cursor: pointer;
  }

  #stormMeter.ready {
    pointer-events: auto;
  }

  @keyframes stormReadyPulse {
    0%, 100% { box-shadow: inset 0 0 0 2px rgba(0,0,0,0.4), 0 0 6px 2px rgba(255,214,120,0.5); }
    50% { box-shadow: inset 0 0 0 2px rgba(0,0,0,0.4), 0 0 14px 6px rgba(255,214,120,0.9); }
  }

  /* TIMER — upper-right corner, mirrors the health meter's placement */
  #scoreVal.pop {
    display: inline-block;
    animation: scorePop 0.28s ease-out;
  }
  @keyframes scorePop {
    0% { transform: scale(1); }
    35% { transform: scale(1.35); color: #b8860b; }
    100% { transform: scale(1); }
  }

  #muteBtn {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    left: 14px;
    width: 40px;
    height: 40px;
    padding: 0;
    background: linear-gradient(#f5e6c8, #d8c3a5);
    border: 3px solid #6b4a2b;
    border-radius: 50%;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 0 0 2px #c9a66b;
    font-size: 18px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 12;
    cursor: pointer;
  }

  #timerFrame {
    position: absolute;
    left: 78.7%;
    top: 8%;
    width: 21.3%;
    height: 37%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3a2410;
    font-weight: bold;
    font-size: clamp(12px, 3.8vw, 22px);
    letter-spacing: 0.3px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    z-index: 2;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    text-align: center;
  }

  /* Overlays (start / game over) */
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(20, 12, 5, 0.55);
    z-index: 20;
    text-align: center;
    padding: 0 24px;
    box-sizing: border-box;
  }

  .overlay.hidden { display: none; }

  .overlay h1 {
    color: #f5e6c8;
    font-size: 34px;
    margin: 0 0 6px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    letter-spacing: 2px;
  }

  .overlay p {
    color: #e8d5b0;
    font-size: 17px;
    margin: 4px 0 22px 0;
  }

  .overlay .bigScore {
    color: #f5e6c8;
    font-size: 46px;
    font-weight: bold;
    margin-bottom: 4px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  .overlay .bestScore {
    color: #c9a66b;
    font-size: 16px;
    margin-bottom: 24px;
  }

  .gameFlyBtn {
    padding: 16px 48px;
    background: linear-gradient(#8b1e1e, #5e1212);
    border: 3px solid #f5e6c8;
    border-radius: 8px;
    color: #f5e6c8;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 3px;
    box-shadow: 0 4px 0 #3a0a0a, 0 6px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    font-family: 'Georgia', serif;
  }

  .gameFlyBtn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #3a0a0a, 0 3px 6px rgba(0,0,0,0.5);
  }

</style>
</head>

<body>

<div id="menuScreen">
<div class="stage">
  <img class="stageBg" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_03.webp?cb=2" alt="Airborne Aces" />

  <img class="cloudLayer cA" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_04.webp?cb=2" alt="" />
  <img class="cloudLayer cB" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_05.webp?cb=2" alt="" />

  <div class="heroBlimpWrap">
    <img id="heroBlimpImg" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_06.webp?cb=2" alt="" />
    <div class="propBlur" id="propBlur"></div>
    <div class="smokeParticles" id="smokeParticles">
      <span class="puff p1"></span>
      <span class="puff p2"></span>
      <span class="puff p3"></span>
      <span class="puff p4"></span>
      <span class="puff p5"></span>
    </div>
  </div>

  <button class="flyBtn" id="flyBtn"></button>

  <button class="numBtn n1 active" onclick="selectBlimp('blimp1', this)" aria-label="Zeppelin Ace">
    <img crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_07.webp?cb=2" alt="" />
  </button>
  <button class="numBtn n2" onclick="selectBlimp('blimp2', this)" aria-label="Deco Liner">
    <img crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_08.webp?cb=2" alt="" />
  </button>
  <button class="numBtn n3" onclick="selectBlimp('blimp3', this)" aria-label="Aero Slicer">
    <img crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_09.webp?cb=2" alt="" />
  </button>
  <button class="numBtn n4" onclick="selectBlimp('blimp4', this)" aria-label="Steampunk">
    <img crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_10.webp?cb=2" alt="" />
  </button>

  <div class="sliderArea">
    <input type="range" class="tapSlider" min="1" max="5" value="3" aria-label="Tap Strength" />
    <span class="sliderLabel">Tap Strength</span>
  </div>
</div>
</div>

<div id="gameScreen" style="display:none;">
<canvas id="gameCanvas"></canvas>

<button id="muteBtn" aria-label="Toggle sound">🔊</button>

<div id="hudFrame">
  <img id="hudFrameImg" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/hudFrame.webp?cb=2" alt="" />

  <div id="healthMeter">
    <img id="healthImg" crossorigin="anonymous" src="https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/heartPickup.webp?cb=2" alt="Health" />
  </div>

  <div id="bonusHearts"></div>

  <div class="scoreFrame">SCORE: <span id="scoreVal">0</span></div>

  <div id="timerFrame">0:00</div>
</div>

<div id="stormMeter">

<script>
/* =====================================================================
   PLACEHOLDER ASSET GENERATOR
   Draws stand-in art for every sprite in the game with <canvas>, so the
   whole thing runs standalone with zero network requests while the real
   GitHub-hosted assets get sorted out. Flip PLACEHOLDER_MODE to false
   once the assets/ repo is live and everything switches back to the
   real raw.githubusercontent.com art automatically.
   ===================================================================== */
const PLACEHOLDER_MODE = false;

const PH_PAL = {
  ink: "#2b1c10",
  parchment: "#f0dfb8",
  brass: "#c9a66b",
  brassDark: "#8b6b3d",
  crimson: "#8b1e1e",
  crimsonDark: "#5e1212",
  sky1: "#7fb3d5",
  sky2: "#f5e6c8"
};

function phCanvas(w, h) {
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  return c;
}

function phRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function phDrawZeppelin(ctx, cx, cy, w, h, bodyColor, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle || 0);
  ctx.lineWidth = Math.max(1, w * 0.02);
  ctx.strokeStyle = PH_PAL.ink;
  // tail fin
  ctx.fillStyle = PH_PAL.crimsonDark;
  ctx.beginPath();
  ctx.moveTo(-w * 0.44, -h * 0.05);
  ctx.lineTo(-w * 0.62, -h * 0.34);
  ctx.lineTo(-w * 0.26, -h * 0.1);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.46, h * 0.32, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // brass rivet band
  ctx.strokeStyle = PH_PAL.brass;
  ctx.lineWidth = Math.max(1, w * 0.015);
  ctx.beginPath();
  ctx.ellipse(0, 0, w * 0.3, h * 0.16, 0, 0, Math.PI * 2);
  ctx.stroke();
  // gondola
  ctx.fillStyle = PH_PAL.ink;
  ctx.fillRect(-w * 0.14, h * 0.22, w * 0.28, h * 0.14);
  ctx.restore();
}

function phDrawHeart(ctx, w, h, pips, maxPips) {
  const cx = w / 2, cy = h * 0.5, size = Math.min(w, h) * 0.42;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.moveTo(0, size * 0.32);
  ctx.bezierCurveTo(size, -size * 0.4, size * 0.5, -size, 0, -size * 0.2);
  ctx.bezierCurveTo(-size * 0.5, -size, -size, -size * 0.4, 0, size * 0.32);
  ctx.closePath();
  ctx.fillStyle = "#3a2a18";
  ctx.fill();
  ctx.save();
  ctx.clip();
  const fillH = size * 1.5 * (pips / maxPips);
  ctx.fillStyle = "#c9384a";
  ctx.fillRect(-size, size * 0.5 - fillH, size * 2, fillH);
  ctx.restore();
  ctx.strokeStyle = PH_PAL.ink;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

function phDrawStormCloud(ctx, w, h, boltPhase) {
  ctx.save();
  ctx.translate(w / 2, h * 0.42);
  ctx.fillStyle = "#4a4356";
  [[-0.28, 0.02, 0.24], [0, -0.08, 0.32], [0.3, 0.02, 0.24]].forEach(([x, y, r]) => {
    ctx.beginPath();
    ctx.arc(w * x, h * y, w * r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.strokeStyle = PH_PAL.ink;
  ctx.lineWidth = 2;
  ctx.stroke();
  // lightning bolt
  ctx.fillStyle = boltPhase ? "#ffe066" : "#f5d24a";
  ctx.beginPath();
  ctx.moveTo(-w * 0.04, h * 0.12);
  ctx.lineTo(w * 0.1, h * 0.12);
  ctx.lineTo(-w * 0.02, h * 0.32);
  ctx.lineTo(w * 0.06, h * 0.32);
  ctx.lineTo(-w * 0.14, h * 0.58);
  ctx.lineTo(-w * 0.02, h * 0.3);
  ctx.lineTo(-w * 0.1, h * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

const PH_BLDG_COLORS = {
  bldg_cinema: "#7a4a8b", bldg_apothecary: "#3f7d4a", bldg_newspaper: "#5c5c5c",
  bldg_plain: "#8b6b3d", bldg_hotel: "#a83232", bldg_library: "#2f5f8a"
};
const PH_NUMBTN_COLORS = ["#a83232", "#2f5f8a", "#3f7d4a", PH_PAL.brassDark];

const phCache = {};

function renderPlaceholder(key) {
  if (phCache[key]) return phCache[key];

  const m = key.match(/^(.*)_(\d{2})$/);
  const base = m ? m[1] : key;
  const frame = m ? parseInt(m[2], 10) : 0;
  let w = 200, h = 200, c, ctx;

  if (key === "boss2") {
    w = 240; h = 150; c = phCanvas(w, h); ctx = c.getContext("2d");
    // menacing villain airship — darker hull, crimson trim, bigger fin
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.lineWidth = 4;
    ctx.strokeStyle = PH_PAL.ink;
    ctx.fillStyle = PH_PAL.crimson;
    ctx.beginPath();
    ctx.moveTo(-w * 0.46, -h * 0.06);
    ctx.lineTo(-w * 0.66, -h * 0.36);
    ctx.lineTo(-w * 0.28, -h * 0.1);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#2c2a30";
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.46, h * 0.32, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle = PH_PAL.crimson;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, w * 0.3, h * 0.16, 0, 0, Math.PI * 2);
    ctx.stroke();
    // twin glowing "eye" ports
    ctx.fillStyle = "#ffcf5c";

<script>

const BLIMP_DATA = {
  blimp1: { url: "https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/asset_extra_06.webp?cb=2", key: "asset_extra_06", name: "Zeppelin Ace", effect: "propeller" },
  blimp2: { url: "https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/blimp2_main.webp?cb=2", key: "blimp2_main", name: "Deco Liner", effect: "smoke" },
  blimp3: { url: "https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/blimp3_main.webp?cb=2", key: "blimp3_main", name: "Aero Slicer", effect: null },
  blimp4: { url: "https://raw.githubusercontent.com/trevdiggadee/airborne-aces/main/blimp4_main.webp?cb=2", key: "blimp4_main", name: "Steampunk", effect: null }
};

function blimpSrc(data) {
  return (typeof PLACEHOLDER_MODE !== "undefined" && PLACEHOLDER_MODE) ? renderPlaceholder(data.key) : data.url;
}

let selectedBlimp = "blimp1";

const heroBlimpImg = document.getElementById("heroBlimpImg");
const propBlur = document.getElementById("propBlur");
const smokeParticles = document.getElementById("smokeParticles");

// Set the default hero image right away (placeholder mode skips the network round trip)
heroBlimpImg.src = blimpSrc(BLIMP_DATA.blimp1);

function preloadImages(sources) {
  return Promise.all(sources.map(src => new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => (img.decode ? img.decode().then(resolve).catch(resolve) : resolve());
    img.onerror = resolve;
    img.src = src;
  })));
}

// Preload every blimp asset once up front so switching never stutters
preloadImages(Object.values(BLIMP_DATA).map(b => blimpSrc(b)));

function setEffect(effect) {
  propBlur.style.display = effect === "propeller" ? "block" : "none";
  smokeParticles.style.display = effect === "smoke" ? "block" : "none";
}

function selectBlimp(key, el) {
  selectedBlimp = key;
  const data = BLIMP_DATA[key];

  heroBlimpImg.src = blimpSrc(data);
  setEffect(data.effect);

  document.querySelectorAll(".numBtn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

// initialize the default selection's effect
setEffect(BLIMP_DATA.blimp1.effect);

function startGame(){
  document.getElementById("menuScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  if (window.__airborneGameStart) window.__airborneGameStart();
}

const flyBtn = document.getElementById("flyBtn");
flyBtn.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  flyBtn.classList.add("pressed");
});
["pointerup", "pointercancel", "pointerleave"].forEach(evt => {
  flyBtn.addEventListener(evt, () => flyBtn.classList.remove("pressed"));
});
flyBtn.addEventListener("click", startGame);



</script>

(function () {
  "use strict";

  // ---------- Sound — tiny procedural SFX synth, no audio files needed ----------
  let audioCtx = null;
  let muted = false;
  try { muted = localStorage.getItem("aa_muted") === "1"; } catch (e) { muted = false; }

  function ensureAudio() {
    if (audioCtx) {
      if (audioCtx.state === "suspended") audioCtx.resume();
      return;
    }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { audioCtx = null; }
  }

  function setMuted(m) {
    muted = m;
    try { localStorage.setItem("aa_muted", muted ? "1" : "0"); } catch (e) {}
    const btn = document.getElementById("muteBtn");
    if (btn) btn.textContent = muted ? "🔇" : "🔊";
  }

  function beep({ freq = 440, duration = 0.1, type = "sine", vol = 0.2, sweep = 0, startDelay = 0 }) {
    if (muted || !audioCtx) return;
    const t0 = audioCtx.currentTime + startDelay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq + sweep), t0 + duration);
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + duration + 0.02);
  }

  function noiseBurst({ duration = 0.2, vol = 0.25, startDelay = 0 }) {
    if (muted || !audioCtx) return;
    const t0 = audioCtx.currentTime + startDelay;
    const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
    src.connect(gain); gain.connect(audioCtx.destination);
    src.start(t0);
  }

  function loadAssets(onDone) {
    assetKeys.forEach(key => {
      const img = new Image();
      if (!PLACEHOLDER_MODE) img.crossOrigin = "anonymous";
      const settle = () => {
        assetsLoaded++;
        if (assetsLoaded === assetKeys.length) {
          onDone();
          if (failedAssetKeys.length) {
            console.warn("Airborne Aces: " + failedAssetKeys.length + " asset(s) missing from the repo, using placeholder art:", failedAssetKeys);
            // on-screen banner disabled for now — check the console list above if something's missing
          }
        }
      };
      img.onload = settle;
      img.onerror = () => {
        failedAssetKeys.push(key);
        if (!PLACEHOLDER_MODE) {
          // the real asset is missing/renamed in the repo — fall back to the
          // hand-drawn placeholder so the sprite doesn't just vanish
          img.onerror = settle; // guard against a loop if even that somehow fails
          img.removeAttribute("crossorigin");
          img.src = renderPlaceholder(key);
        } else {
          settle();
        }
      };
      img.src = PLACEHOLDER_MODE ? renderPlaceholder(key) : ASSET_SOURCES[key];
      images[key] = img;

  // Offscreen canvas used to composite a "white flash" that's clipped to a
  // sprite's own opaque pixels (not a plain rectangle) — used for hit feedback.
  const flashCanvas = document.createElement("canvas");
  const flashCtx = flashCanvas.getContext("2d");

  function drawSpriteFlash(img, x, y, w, h, alpha) {
    const cw = Math.max(1, Math.ceil(w));
    const ch = Math.max(1, Math.ceil(h));
    flashCanvas.width = cw;
    flashCanvas.height = ch;
    flashCtx.clearRect(0, 0, cw, ch);
    flashCtx.drawImage(img, 0, 0, cw, ch);
    flashCtx.globalCompositeOperation = "source-atop";
    flashCtx.fillStyle = "#ffffff";
    flashCtx.fillRect(0, 0, cw, ch);
    flashCtx.globalCompositeOperation = "source-over";
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.drawImage(flashCanvas, x, y, w, h);
    ctx.restore();
  }
  let dpr = Math.max(1, window.devicePixelRatio || 1);

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  window.addEventListener("resize", resize);

  // ---------- Buildings (ground obstacles — fly over the rooftops) ----------
  // Each building: { x, w, h, key } — h/w are on-screen display dimensions.
  // Height changes gradually (random walk) so the skyline is fair to react to.
  let buildings = [];
  let lastBuildingHeight = 0;
  let lastBuildingKey = null;

  function pickBuildingKey() {
    let key;
    do {
      key = BUILDING_KEYS[Math.floor(Math.random() * BUILDING_KEYS.length)];
    } while (key === lastBuildingKey && BUILDING_KEYS.length > 1);
    lastBuildingKey = key;
    return key;
  }

  function makeBuilding(xStart) {
    const key = pickBuildingKey();
    const img = images[key];
    const aspect = img.naturalWidth / img.naturalHeight;

    const minH = H * 0.14;
    const maxH = H * 0.5;
    const maxDelta = H * 0.16;

    if (lastBuildingHeight === 0) {
      lastBuildingHeight = minH + Math.random() * (maxH - minH) * 0.4;
    } else {
      let target = lastBuildingHeight + (Math.random() * 2 - 1) * maxDelta;
      target = Math.max(minH, Math.min(maxH, target));
      lastBuildingHeight = target;
    }

    const h = lastBuildingHeight;
    const w = h * aspect;
    return { x: xStart, w, h, key };
  }

  function initBuildings() {
    buildings = [];
    lastBuildingHeight = 0;
    lastBuildingKey = null;
    let x = 0;
    while (x < W + 200) {
      const b = makeBuilding(x);
      buildings.push(b);
      x += b.w - 4; // slight overlap so there are no gaps at ground level
    }
  }

  function updateBuildings(dtScale) {
    const speed = 0.8 * dtScale * (obstacleSpeedScale());
    buildings.forEach(b => (b.x -= speed));
    while (buildings.length && buildings[0].x + buildings[0].w < -10) {
      buildings.shift();
    }
    const last = buildings[buildings.length - 1];
    if (!last || last.x + last.w < W + 200) {
      const startX = last ? last.x + last.w - 4 : 0;
      buildings.push(makeBuilding(startX));
    }
  }

  function obstacleSpeedScale() {
    // keep the ground scroll speed in step with the flying-obstacle speed ramp
    return obstacleSpeed / 220;
  }

  function drawBuildings() {
    const groundY = H - 6;
    buildings.forEach(b => {
      const img = images[b.key];
      if (!img.naturalWidth) return;
      const top = groundY - b.h;
      ctx.drawImage(img, b.x, top, b.w, b.h);
    });
    // ground strip to visually connect building bases
    ctx.fillStyle = "#2c1d10";
    ctx.fillRect(0, groundY, W, H - groundY);
  }

  function checkBuildingCollision() {
    if (bonusActive) return; // invincible during the bonus round
    const groundY = H - 6;
    const px1 = player.x - (player.w / 2) * 0.7;
    const px2 = player.x + (player.w / 2) * 0.7;
    const pBottom = player.y + (player.h / 2) * 0.7;

    for (const b of buildings) {
      const top = groundY - b.h;
      const overlapsX = px2 > b.x + b.w * 0.08 && px1 < b.x + b.w * 0.92;
      if (overlapsX && pBottom > top) {
        takeHit();
        return;
      }
    }
  }

      ctx.globalAlpha = c.alpha;
      ctx.drawImage(img, c.x, c.y, w, h);

  // ---------- Player ----------
  const GRAVITY = 1500;       // px/s^2
  const FLAP_VELOCITY = -430; // px/s (instant upward speed on tap)
  const MAX_FALL_SPEED = 700;

  const player = {
    x: 0, y: 0,
    vy: 0,
    w: 84, h: 50, // hitbox-ish display size, aspect-corrected below
    rotation: 0
  };

  function resetPlayer() {
    const firstFrame = currentPlayerImage();
    const aspect = (firstFrame && firstFrame.naturalWidth && firstFrame.naturalHeight / firstFrame.naturalWidth) || 0.6;
    player.w = Math.min(110, W * 0.22);
    player.h = player.w * aspect;
    player.x = W * 0.28;
    player.y = H * 0.4;
    player.vy = 0;
    player.rotation = 0;
    playerBlimpFrame = 0;
    playerBlimpFrameTimer = 0;
  }

  function updatePlayerBlimpAnimation(dt) {
    playerBlimpFrameTimer += dt;
    const frameDuration = 1 / PLAYER_BLIMP_FPS;
    while (playerBlimpFrameTimer >= frameDuration) {
      playerBlimpFrameTimer -= frameDuration;
      playerBlimpFrame = (playerBlimpFrame + 1) % PLAYER_BLIMP_FRAME_COUNT;
    }
  }

  function flap() {
    if (state !== "playing") return;
    player.vy = FLAP_VELOCITY;
    sfxFlap();
  }

  function updatePlayer(dt) {
    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL_SPEED) player.vy = MAX_FALL_SPEED;
    player.y += player.vy * dt;

    // rotation follows velocity, clamped
    const target = Math.max(-0.4, Math.min(0.9, player.vy / 600));
    player.rotation += (target - player.rotation) * 0.15;

    const groundY = H - 6;
    if (player.y + player.h / 2 > groundY) {
      player.y = groundY - player.h / 2;
      takeHit();
    }
    if (player.y - player.h / 2 < 0) {
      player.y = player.h / 2;
      player.vy = 0;
    }

    maybeEmitWind(player.x - player.w * 0.32, player.y, player.w * 0.5, player.h, 10, dt);
  }

  function drawPlayer() {
    const img = currentPlayerImage();
    if (!img || !img.naturalWidth) return;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.rotation);
    if (performance.now() < invulnerableUntil) {
      // fast blink while briefly invulnerable after a hit
      ctx.globalAlpha = (Math.floor(performance.now() / 90) % 2 === 0) ? 1 : 0.35;
    }
    ctx.drawImage(img, -player.w / 2, -player.h / 2, player.w, player.h);
    ctx.restore();
  }

  // ---------- Obstacles ----------

  // ---------- Dodge combo / graze system ----------
  const GRAZE_THRESHOLD = 16;  // px — how close a non-collision counts as a "graze"
  const GRAZE_BONUS = 2;
  const STREAK_MILESTONE = 5;  // award a bonus every N consecutive un-hit dodges
  const STREAK_BONUS = 10;
  let dodgeStreak = 0;
  let comboPopups = []; // floating "GRAZE!" / "5x STREAK!" text

  function spawnComboPopup(x, y, text, color) {
    comboPopups.push({ x, y, text, color, born: performance.now(), life: 900 });
  }

  function updateComboPopups() {
    const now = performance.now();
    comboPopups = comboPopups.filter(p => now - p.born < p.life);
  }

  function drawComboPopups() {
    const now = performance.now();
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = "bold " + Math.max(14, Math.min(20, W * 0.05)) + "px Georgia, serif";
    comboPopups.forEach(p => {
      const t = (now - p.born) / p.life;
      const y = p.y - t * 36;
      ctx.globalAlpha = Math.max(0, 1 - t);
      ctx.shadowColor = "rgba(0,0,0,0.7)";
      ctx.shadowBlur = 4;
      ctx.shadowOffsetX = 1;
      ctx.shadowOffsetY = 2;
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, y);
    });
    ctx.restore();
  }

  function pickObstacleType() {
    const next = nextBossConfig();
    if (next && !bossActive) {
      const leadInStart = next.threshold - 25;
      if (gameplayScore >= leadInStart && gameplayScore < next.threshold && Math.random() < 0.3) {
        return next.miniType;
      }
    }
    return Math.random() < 0.5 ? "bird_a" : "bird_b";
  }

  function spawnObstacle() {
    const type = pickObstacleType();
    const frames = OBSTACLE_ANIM_SETS[type];
    const img = images[frames[0]];
    const aspect = imgAspect(img);
    const dispW = type === "balloon_anim" ? Math.min(90, W * 0.18) : Math.min(70, W * 0.15);
    const dispH = dispW * aspect;

    // Buildings can rise up to maxH (see makeBuilding: H*0.5) above the ground,
    // so keep flying obstacles' full extent (including bob) above that line —
    // clearly in open sky, never dipping down into rooftop territory.
    const groundY = H - 6;
    const tallestRoofY = groundY - H * 0.5;
    const topMargin = H * 0.035; // use almost the full top of the screen
    const bobBuffer = 20; // max bob amplitude, so bobbing never dips into rooftops
    const minY = topMargin;
    const maxY = Math.max(minY + 40, tallestRoofY - dispH - bobBuffer);
    const y = minY + Math.random() * (maxY - minY);

    obstacles.push({
      type,
      x: W + dispW,
      y,
      w: dispW,
      h: dispH,
      bobPhase: Math.random() * Math.PI * 2,
      bobSpeed: 1.5 + Math.random() * 1.2,
      bobAmount: 8 + Math.random() * 10,
      speedMult: type === "balloon_anim" ? 0.72 : 1,
      animFrame: Math.floor(Math.random() * OBSTACLE_ANIM_FRAME_COUNT),
      animTimer: Math.random() / OBSTACLE_ANIM_FPS,
      scored: false
    });
  }

  function updateObstacles(dt) {
    if (!bossActive && !bonusActive) {
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnObstacle();
      }
    }

    const frameDuration = 1 / OBSTACLE_ANIM_FPS;
    obstacles.forEach(o => {
      o.x -= obstacleSpeed * (o.speedMult || 1) * dt;
      o.bobPhase += o.bobSpeed * dt;
      o.animTimer += dt;
      while (o.animTimer >= frameDuration) {
        o.animTimer -= frameDuration;
        o.animFrame = (o.animFrame + 1) % OBSTACLE_ANIM_FRAME_COUNT;
      }
      maybeEmitWind(o.x + o.w * 0.38, o.y + o.h / 2, o.w * 0.3, o.h, 7, dt);
    });

    obstacles = obstacles.filter(o => o.x + o.w > -20);

    // scoring + collision
    obstacles.forEach(o => {
      const drawY = o.y + Math.sin(o.bobPhase) * o.bobAmount;

      const dx = Math.abs(player.x - (o.x + o.w / 2));
      const dy = Math.abs(player.y - (drawY + o.h / 2));
      const collideX = (player.w / 2) * 0.75 + (o.w / 2) * 0.75;
      const collideY = (player.h / 2) * 0.75 + (o.h / 2) * 0.75;

      // track the closest non-colliding vertical gap while horizontally
      // in range, so a dodge can be recognized as a "close call" (graze)
      if (dx < collideX * 1.4) {
        const gap = dy - collideY;
        if (gap >= 0 && gap < GRAZE_THRESHOLD && (o.minGap === undefined || gap < o.minGap)) {
          o.minGap = gap;
        }
      }

      if (!o.scored && o.x + o.w < player.x - player.w / 2) {
        o.scored = true;
        score++;
        gameplayScore++; // only counts normal dodge-scoring — bonus round points don't affect boss pacing
        document.getElementById("scoreVal").textContent = score;
        bumpScorePop();
        // ramp difficulty gently
        obstacleSpeed = 220 + Math.min(160, score * 6);
        spawnInterval = Math.max(0.95, 1.7 - score * 0.03);
        if (!bossActive) {
          const next = nextBossConfig();
          if (next && gameplayScore >= next.threshold) {
            triggerBoss(next.num);
          }
        }
        // storm meter: one gas-tank notch every 25 points, until it's full
        const milestone = Math.floor(score / STORM_CHARGE_PER_MILESTONE) * STORM_CHARGE_PER_MILESTONE;
        if (milestone > lastStormMilestone && milestone > 0 && stormCharge < STORM_MAX) {
          lastStormMilestone = milestone;
          stormCharge = Math.min(STORM_MAX, stormCharge + STORM_CHARGE_PER_MILESTONE);
          updateStormMeterDisplay();
        }

        // dodge streak + graze bonus
        dodgeStreak++;
        if (o.minGap !== undefined) {
          score += GRAZE_BONUS;
          document.getElementById("scoreVal").textContent = score;
          bumpScorePop();
          spawnComboPopup(player.x, player.y - player.h * 0.7, "GRAZE! +" + GRAZE_BONUS, "#ffffff");
          sfxStreak();
        }
        if (dodgeStreak > 0 && dodgeStreak % STREAK_MILESTONE === 0) {
          score += STREAK_BONUS;
          document.getElementById("scoreVal").textContent = score;
          bumpScorePop();
          spawnComboPopup(player.x, player.y - player.h * 0.9, dodgeStreak + "x STREAK! +" + STREAK_BONUS, "#800000");
          sfxStreak();
        }
      }

      if (dx < collideX && dy < collideY) {
        takeHit();
      }
    });
  }

  function drawObstacles() {
    obstacles.forEach(o => {
      const frames = OBSTACLE_ANIM_SETS[o.type];
      const img = images[frames[o.animFrame]];
      if (!img || !img.naturalWidth) return;
      const drawY = o.y + Math.sin(o.bobPhase) * o.bobAmount;
      ctx.drawImage(img, o.x, drawY, o.w, o.h);
    });
  }

  // ---------- Floating heal pickup — sporadic, restores 25% (1 heart) ----------
  let healPickup = null;
  let healSpawnTimer = 6 + Math.random() * 5; // first one arrives a little sooner

  function spawnHealPickup() {
    const img = images.heartPickup;
    const aspect = imgAspect(img);
    const dispW = Math.min(50, W * 0.12);
    const dispH = dispW * aspect;

    const groundY = H - 6;
    const tallestRoofY = groundY - H * 0.5;
    const minY = H * 0.08;
    const maxY = Math.max(minY + 40, tallestRoofY - dispH - 20);

    healPickup = {
      x: W + dispW,
      y: minY + Math.random() * (maxY - minY),
      w: dispW,
      h: dispH,
      bobPhase: Math.random() * Math.PI * 2,
      speed: 150
    };
  }

  function updateHealPickup(dt) {
    if (!healPickup) {
      healSpawnTimer -= dt;
      if (healSpawnTimer <= 0) {
        spawnHealPickup();
        healSpawnTimer = 11 + Math.random() * 9; // next sporadic appearance
      }
      return;
    }

    healPickup.x -= healPickup.speed * dt;
    healPickup.bobPhase += dt * 2.2;

    if (healPickup.x < -healPickup.w - 20) {
      healPickup = null;
      return;
    }

    const drawY = healPickup.y + Math.sin(healPickup.bobPhase) * 8;
    const dx = Math.abs(player.x - (healPickup.x + healPickup.w / 2));
    const dy = Math.abs(player.y - (drawY + healPickup.h / 2));
    if (dx < player.w * 0.5 + healPickup.w * 0.45 && dy < player.h * 0.5 + healPickup.h * 0.45) {
      sfxHeart();
      if (health < MAX_HEALTH) {
        health = Math.min(MAX_HEALTH, health + 1);
        updateHealthDisplay();
        healthMeter.classList.remove("hit");
        void healthMeter.offsetWidth;
        healthMeter.classList.add("hit");
        showBanner("+25% HEALTH", 1200);
      } else if (health < MAX_HEALTH + MAX_BONUS_HEARTS) {
        health++;
        updateHealthDisplay();
        healthMeter.classList.remove("hit");
        void healthMeter.offsetWidth;
        healthMeter.classList.add("hit");
        showBanner("+1 EXTRA HEART!", 1400);
      } else {
        showBanner("HEARTS FULL!", 900);
      }
      healPickup = null;
    }
  }

  function drawHealPickup() {
    if (!healPickup) return;
    const img = images.heartPickup;
    if (!img.naturalWidth) return;
    const drawY = healPickup.y + Math.sin(healPickup.bobPhase) * 8;

    ctx.save();
    ctx.translate(healPickup.x + healPickup.w / 2, drawY + healPickup.h / 2);
    const pulse = 1 + Math.sin(performance.now() / 160) * 0.06;
    ctx.scale(pulse, pulse);
    const glow = ctx.createRadialGradient(0, 0, healPickup.w * 0.15, 0, 0, healPickup.w * 0.9);
    glow.addColorStop(0, "rgba(255,120,120,0.5)");
    glow.addColorStop(1, "rgba(255,120,120,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, healPickup.w * 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.drawImage(img, -healPickup.w / 2, -healPickup.h / 2, healPickup.w, healPickup.h);
    ctx.restore();
  }

  // ---------- Shield pickup — rare mid-flight invincibility, boss fights excluded ----------
  let shieldPickup = null;
  let shieldSpawnTimer = 25 + Math.random() * 15;
  let shieldActive = false;
  let shieldUntil = 0;
  const SHIELD_DURATION_MS = 6000;

  function spawnShieldPickup() {
    const img = images.shieldPickup;
    const aspect = img && img.naturalWidth ? img.naturalHeight / img.naturalWidth : 1;
    const dispW = Math.min(48, W * 0.11);
    const dispH = dispW * aspect;

    const groundY = H - 6;
    const tallestRoofY = groundY - H * 0.5;
    const minY = H * 0.08;
    const maxY = Math.max(minY + 40, tallestRoofY - dispH - 20);

    shieldPickup = {
      x: W + dispW,
      y: minY + Math.random() * (maxY - minY),
      w: dispW,
      h: dispH,
      bobPhase: Math.random() * Math.PI * 2,
      speed: 160
    };
  }

  function updateShieldPickup(dt) {
    if (shieldActive && performance.now() > shieldUntil) {
      shieldActive = false;
    }

    if (bossActive || bonusActive) return; // shield only spawns during normal flight

    if (!shieldPickup) {
      shieldSpawnTimer -= dt;
      if (shieldSpawnTimer <= 0) {
        spawnShieldPickup();
        shieldSpawnTimer = 55 + Math.random() * 35; // next chance well after this one
      }
      return;
    }

    shieldPickup.x -= shieldPickup.speed * dt;
    shieldPickup.bobPhase += dt * 2.4;

    if (shieldPickup.x < -shieldPickup.w - 20) {
      shieldPickup = null;
      return;
    }

    const drawY = shieldPickup.y + Math.sin(shieldPickup.bobPhase) * 8;
    const dx = Math.abs(player.x - (shieldPickup.x + shieldPickup.w / 2));
    const dy = Math.abs(player.y - (drawY + shieldPickup.h / 2));
    if (dx < player.w * 0.5 + shieldPickup.w * 0.45 && dy < player.h * 0.5 + shieldPickup.h * 0.45) {
      shieldActive = true;
      shieldUntil = performance.now() + SHIELD_DURATION_MS;
      shieldPickup = null;
      sfxPowerup();
      showBanner("SHIELD ACTIVATED!", 1400);
    }
  }

  function drawShieldPickup() {
    if (!shieldPickup) return;
    const img = images.shieldPickup;
    if (!img || !img.naturalWidth) return;
    const drawY = shieldPickup.y + Math.sin(shieldPickup.bobPhase) * 8;
    ctx.save();
    ctx.translate(shieldPickup.x + shieldPickup.w / 2, drawY + shieldPickup.h / 2);
    const pulse = 1 + Math.sin(performance.now() / 150) * 0.07;
    ctx.scale(pulse, pulse);
    ctx.drawImage(img, -shieldPickup.w / 2, -shieldPickup.h / 2, shieldPickup.w, shieldPickup.h);
    ctx.restore();
  }

  function drawShieldEffect() {
    if (!shieldActive) return;
    const pulse = 1 + Math.sin(performance.now() / 120) * 0.06;
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = "rgba(120,200,255,0.12)";
    ctx.beginPath();
    ctx.arc(0, 0, player.w * 0.7 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(120,200,255,0.85)";
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
  }

  // ---------- Boss encounters — five bosses, one every 50 gameplay points ----------
  // "gameplayScore" only counts normal dodge-scoring, so bonus-round points never
  // shift boss pacing (see the scoring block in updateObstacles).
  const BOSSES = [
    { num: 1, threshold: 50,  maxHealth: 16,  kind: "bomber",  miniType: "balloon_anim",
      label: "BOSS INCOMING!",         defeatLabel: "BOSS DEFEATED!",         powerupKind: "gold",    defeatBonus: 25,  bonusRound: "balloon" },
    { num: 2, threshold: 100, maxHealth: 64,  kind: "rocket",  miniType: "mini_blimp",
      label: "SECOND BOSS INCOMING!",  defeatLabel: "SECOND BOSS DEFEATED!",  powerupKind: "blue",    defeatBonus: 60,  bonusRound: "coin" },
    { num: 3, threshold: 150, maxHealth: 96,  kind: "tank",    miniType: "mini_tank",
      label: "THIRD BOSS INCOMING!",   defeatLabel: "THIRD BOSS DEFEATED!",   powerupKind: "arcbomb", defeatBonus: 90,  bonusRound: "balloon" },
    { num: 4, threshold: 200, maxHealth: 140, kind: "heli",    miniType: "mini_heli",
      label: "FOURTH BOSS INCOMING!",  defeatLabel: "FOURTH BOSS DEFEATED!",  powerupKind: "gold",    defeatBonus: 130, bonusRound: "coin" },
    { num: 5, threshold: 250, maxHealth: 200, kind: "octopus", miniType: "mini_ebomb",
      label: "FIFTH BOSS INCOMING!",   defeatLabel: "FIFTH BOSS DEFEATED!",   powerupKind: "blue",    defeatBonus: 190, bonusRound: "balloon" }
  ];
  function bossConfig(num) { return BOSSES.find(b => b.num === num); }
  function nextBossConfig() { return BOSSES.find(b => b.num > lastBossTriggered); }
  function bossImgKey(num) { return num === 1 ? "boss" : "boss" + num; }

  let lastBossTriggered = 0;   // 0 = none yet; highest boss number triggered so far
  let bossNumber = 0;          // 0 = none active, else the boss currently on screen
  let bossActive = false;
  let boss = null;

  let powerup = null;
  let hasFirepower = false;
  let hasDualFire = false; // granted by the blue power-up during the second boss fight
  let hasArcBomb = false;  // granted by the green power-up during the third (tank) boss fight
  let playerBombs = [];    // player-dropped arc bombs, used against the ground-based tank boss
  let arcBombTimer = 0;
  const ARC_BOMB_INTERVAL = 0.85;

  function spawnArcBomb(arr, startX, startY, targetX, targetY, gravity, minTime, maxTime) {
    const throwTime = minTime + Math.random() * (maxTime - minTime);
    const dx = targetX - startX;
    const dy = targetY - startY;
    arr.push({
      x: startX,
      y: startY,
      vx: dx / throwTime,
      vy: (dy - 0.5 * gravity * throwTime * throwTime) / throwTime,
      gravity,
      r: Math.min(20, W * 0.05),
      rotation: 0,
      rotSpeed: 4 + Math.random() * 3
    });
  }
